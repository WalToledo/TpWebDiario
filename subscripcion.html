<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar</title>
    <link rel="icon" href="https://media.licdn.com/dms/image/v2/C4E0BAQEtv0wUkm1BeA/company-logo_200_200/company-logo_200_200/0/1630640859579/diario_la_capital_logo?e=2147483647&v=beta&t=rbBEq00ylb07pDAXhy9OH_A1zkd4G6HQKGIsqnXhSbY">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="subscripcion.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Logo_de_La_Capital_de_Rosario.svg/1280px-Logo_de_La_Capital_de_Rosario.svg.png" alt="LA CAPITAL">
        <h1>Ingresar</h1>
    </div>

    <form class="formIngresar" id="formulario">
        <label for="username">Nombre Completo:</label>
        <input type="text" id="username" name="username" placeholder="Nombre Completo">
        <span class="error-msg" id="error-username"></span>

        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" name="email" placeholder="Correo Electrónico" >
        <span class="error-msg" id="error-email"></span>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" placeholder="Contraseña" >
        <span class="error-msg" id="error-password"></span>

        <label for="confirm-password">Confirmar Contraseña:</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirmar Contraseña" >
        <span class="error-msg" id="error-confirm-password"></span>

        <label for="age">Edad:</label>
        <input type="number" id="age" name="age" placeholder="Edad" >
        <span class="error-msg" id="error-age"></span>

        <label for="phone">Número de Teléfono:</label>
        <input type="tel" id="phone" name="phone" placeholder="Número de Teléfono" >
        <span class="error-msg" id="error-phone"></span>

        <label for="address">Dirección:</label>
        <input type="text" id="address" name="address" placeholder="Dirección" >
        <span class="error-msg" id="error-address"></span>

        <label for="city">Ciudad:</label>
        <input type="text" id="city" name="city" placeholder="Ciudad" >
        <span class="error-msg" id="error-city"></span>

        <label for="postal-code">Código Postal:</label>
        <input type="text" id="postal-code" name="postal-code" placeholder="Código Postal" >
        <span class="error-msg" id="error-postal-code"></span>

        <label for="dni">DNI:</label>
        <input type="number" id="dni" name="dni" placeholder="DNI" >
        <span class="error-msg" id="error-dni"></span>

        <button type="submit">Enviar</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
