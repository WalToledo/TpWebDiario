<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar</title>
    <link rel="stylesheet" href="subscripcion.css">
</head>
<body>
    <form class="formIngresar">
        <label for="username">Nombre de Usuario:</label>
        <input type="text" id="username" name="username" placeholder="Nombre de Usuario" required>

        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" name="email" placeholder="Correo Electrónico" required>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" placeholder="Contraseña" required>

        <label for="confirm-password">Confirmar Contraseña:</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirmar Contraseña" required>

        <label for="phone">Número de Teléfono:</label>
        <input type="tel" id="phone" name="phone" placeholder="Número de Teléfono" required>

        <label for="address">Dirección:</label>
        <input type="text" id="address" name="address" placeholder="Dirección" required>

        <label for="city">Ciudad:</label>
        <input type="text" id="city" name="city" placeholder="Ciudad" required>

        <label for="postal-code">Código Postal:</label>
        <input type="text" id="postal-code" name="postal-code" placeholder="Código Postal" required>

        <label for="dni">DNI:</label>
        <input type="number" id="dni" name="dni" placeholder="DNI" required>

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
